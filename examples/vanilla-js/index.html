<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pixflow · Week 6-8 demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>pixflow</h1>
        <p class="tagline">
          WebGPU image pipeline · Week 6-8: encoding, batch API, EXIF orient, real-world presets
        </p>
      </header>

      <section id="status-panel">
        <div class="status" id="status">Detecting WebGPU…</div>
        <div class="status small" id="avif-status">Probing AVIF…</div>
      </section>

      <section class="controls">
        <div class="row">
          <label for="preset">Preset</label>
          <select id="preset">
            <option value="forum-post">Forum post</option>
            <option value="ecommerce-thumbnail">Ecommerce thumbnail</option>
            <option value="blog-hero">Blog hero</option>
            <option value="avatar">Avatar</option>
          </select>
          <span id="preset-description" class="hint"></span>
        </div>

        <div
          id="dropzone"
          class="dropzone"
          role="button"
          tabindex="0"
          aria-label="Drop images here or click to browse"
        >
          <input type="file" id="file-input" accept="image/*" multiple hidden />
          <p class="dropzone-primary">Drop images here</p>
          <p class="dropzone-secondary">
            or <button id="browse" type="button" class="link">browse</button> · multi-select
            supported
          </p>
        </div>

        <div class="row">
          <label for="concurrency">Concurrency</label>
          <input type="range" id="concurrency" min="1" max="8" step="1" value="4" />
          <output id="concurrency-value">4</output>
        </div>

        <div class="button-row">
          <button id="run" disabled>Run pipeline</button>
          <button id="cancel" disabled>Cancel</button>
          <button id="download-zip" disabled>Download ZIP</button>
          <button id="clear" disabled>Clear</button>
        </div>

        <p class="hint">
          Everything runs on your GPU, on your device. Nothing is uploaded to any server.
        </p>
      </section>

      <section id="progress-panel" hidden>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div id="progress-label" class="progress-label"></div>
      </section>

      <section id="results" class="results"></section>

      <section id="log" aria-live="polite"></section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
